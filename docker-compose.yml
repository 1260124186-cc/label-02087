services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netdoctor-backend
    ports:
      - "8082:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/netdoctor.db:/app/netdoctor.db
    environment:
      - DEBUG=false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: netdoctor-frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend
    restart: unless-stopped
